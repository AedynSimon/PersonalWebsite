<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="index.html"><h1>AEDYN SIMON</h1></a>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="programming.html">Programming</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="social-icons">
                <a href="https://github.com/AedynSimon" target="_blank" class="icon github">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/aedynsimon/" target="_blank" class="icon linkedin">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://www.instagram.com/aedyn_simon/" target="_blank" class="icon instagram">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </header>

    <main>
        <!-- First Section -->
        <section id="social-contact">
            <div class="contact-content">
                <h2>CONTACT</h2>
                <p>Get in touch with me via social media or send me an email.</p>
                <div class="social-media-icons">
                    <a href="https://github.com/AedynSimon" target="_blank" class="icon github">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/aedynsimon/" class="icon linkedin" target="_blank">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="https://www.instagram.com/aedyn_simon/" class="icon instagram" target="_blank">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </section>

        <!-- Second Section -->
        <section id="email-contact">
            <div class="contact-content">
                <h2>Send me an email</h2>
                <form action="#" method="POST" class="contact-form">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <textarea name="message" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Email</button>
                </form>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
